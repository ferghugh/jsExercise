<!DOCTYPE html>
<html>
    <head>
        <script>
            function sumOfMultiples( n,a,b){
                let total = 0;

                for(let i = 0;i< n; i++){
                    if(i % a == 0|| i % b == 0){
                       total += i;
                    }
                }
                return total;
            }
            let result = sumOfMultiples(1000,3,5);
            alert(result);
        </script>
    </head>
</html>
