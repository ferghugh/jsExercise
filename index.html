<!DOCTYPE html>
<html>
<head>
    <script>
        // Function 1: Sum of multiples below n
        function sumOfMultiples(n, a, b) {
            let total = 0;

            for (let i = 0; i < n; i++) {
                if (i % a === 0 || i % b === 0) {
                    total += i;
                }
            }
            return total;
        }

        let result = sumOfMultiples(10, 3, 5);
        alert("Sum below 10 (3 or 5): " + result);


        // Function 2: Sum of multiples in a list
        function f4(a, b, l) {
            let total = 0;

            for (let i = 0; i < l.length; i++) {
                if (l[i] % a === 0 || l[i] % b === 0) {
                    total += l[i];
                }
            }
            return total;
        }

        result = f4(3, 5, [6, 10, 12]);
        alert("List sum (3 or 5): " + result);


        // Function 3: Multiple divisors (flexible)
        function f5(a, l) {
            let total = 0;

            for (let i = 0; i < l.length; i++) {
                for (let j = 0; j < a.length; j++) {
                    if (l[i] % a[j] === 0) {
                        total += l[i];
                        break;
                    }
                }
            }
            return total;
        }

        result = f5([3, 5], [1, 3, 5, 6, 10, 12]);
        alert("Flexible divisors: " + result);
    </script>
</head>
</html>
